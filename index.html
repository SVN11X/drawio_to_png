<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #141414; --border: #2a2a2a; --border-bright: #3d3d3d;
    --accent: #00e5a0; --accent-dim: #00e5a020; --accent-border: #00e5a040;
    --text: #e8e8e8; --text-dim: #888; --text-muted: #444;
    --error: #ff4d4d; --warn: #ffa940; --ok: #00e5a0;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  html, body { background: var(--bg); color: var(--text); font-family: var(--sans); }
  body { display:flex; flex-direction:column; min-height:100vh; padding:32px 28px; max-width:860px; margin:0 auto; gap:28px; }
  header { display:flex; flex-direction:column; gap:6px; padding-bottom:20px; border-bottom:1px solid var(--border); }
  .title-row { display:flex; align-items:baseline; gap:12px; }
  h1 { font-family:var(--mono); font-size:20px; font-weight:600; letter-spacing:-0.5px; }
  .badge { font-family:var(--mono); font-size:10px; background:var(--accent-dim); color:var(--accent); border:1px solid var(--accent-border); padding:2px 8px; border-radius:3px; letter-spacing:1px; text-transform:uppercase; }
  .subtitle { font-size:13px; color:var(--text-dim); font-weight:300; }
  .drop-zone { border:1.5px dashed var(--border-bright); border-radius:8px; padding:40px 28px; text-align:center; cursor:pointer; transition:all .2s; background:var(--surface); position:relative; }
  .drop-zone:hover, .drop-zone.drag-over { border-color:var(--accent); background:var(--accent-dim); }
  .drop-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .drop-icon { font-size:30px; margin-bottom:10px; display:block; }
  .drop-title { font-family:var(--mono); font-size:13px; font-weight:500; margin-bottom:5px; }
  .drop-sub { font-size:11px; color:var(--text-dim); font-family:var(--mono); }
  .file-list { display:none; flex-direction:column; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .file-list.visible { display:flex; }
  .file-list-header { display:grid; grid-template-columns:1fr 80px 100px 28px; padding:7px 14px; background:#1a1a1a; border-bottom:1px solid var(--border); font-family:var(--mono); font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
  .file-item { display:grid; grid-template-columns:1fr 80px 100px 28px; padding:9px 14px; border-bottom:1px solid var(--border); align-items:center; }
  .file-item:last-child { border-bottom:none; }
  .file-name { font-family:var(--mono); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:10px; }
  .file-size { font-family:var(--mono); font-size:11px; color:var(--text-muted); }
  .file-status { font-family:var(--mono); font-size:11px; }
  .status-pending { color:var(--text-muted); } .status-running { color:var(--warn); } .status-done { color:var(--ok); } .status-error { color:var(--error); }
  .file-remove { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:13px; padding:2px; border-radius:3px; transition:color .15s; font-family:var(--mono); }
  .file-remove:hover { color:var(--error); } .file-remove:disabled { opacity:.2; cursor:not-allowed; }
  .actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .btn { font-family:var(--mono); font-size:12px; font-weight:500; padding:9px 18px; border-radius:5px; border:1.5px solid transparent; cursor:pointer; transition:all .15s; letter-spacing:.3px; text-transform:uppercase; }
  .btn-primary { background:var(--accent); color:#000; border-color:var(--accent); }
  .btn-primary:hover { background:#00ffb3; } .btn-primary:disabled { opacity:.3; cursor:not-allowed; }
  .btn-ghost { background:transparent; color:var(--text-dim); border-color:var(--border-bright); }
  .btn-ghost:hover { color:var(--text); border-color:var(--text-dim); } .btn-ghost:disabled { opacity:.3; cursor:not-allowed; }
  .btn-dl { background:transparent; color:var(--accent); border-color:var(--accent-border); }
  .btn-dl:hover { background:var(--accent-dim); } .btn-dl:disabled { opacity:.3; cursor:not-allowed; }
  .progress-info { font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-left:auto; }
  .log-box { background:#0a0a0a; border:1px solid var(--border); border-radius:6px; overflow:hidden; display:none; }
  .log-box.visible { display:block; }
  .log-header { padding:7px 14px; background:#141414; border-bottom:1px solid var(--border); font-family:var(--mono); font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; display:flex; align-items:center; gap:8px; }
  .log-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .log-dot.stopped { animation:none; opacity:.3; }
  .log-content { padding:12px 14px; font-family:var(--mono); font-size:11px; line-height:1.7; max-height:160px; overflow-y:auto; }
  .log-content::-webkit-scrollbar { width:3px; } .log-content::-webkit-scrollbar-thumb { background:var(--border-bright); }
  .log-line-ok { color:var(--ok); } .log-line-err { color:var(--error); } .log-line-warn { color:var(--warn); } .log-line-info { color:var(--text-dim); }
  footer { margin-top:auto; font-family:var(--mono); font-size:10px; color:var(--text-muted); padding-top:14px; border-top:1px solid var(--border); display:flex; justify-content:space-between; }
</style>
</head>
<body>
<header>
  <div class="title-row">
    <h1>.drawio → PNG</h1>
    <span class="badge">iframe · embed.diagrams.net</span>
  </div>
  <p class="subtitle">Motor oficial — render idéntico a draw.io desktop.</p>
</header>

<div class="drop-zone" id="dropZone">
  <input type="file" id="fileInput" accept=".drawio,.xml" multiple>
  <span class="drop-icon">⬡</span>
  <div class="drop-title">Arrastra archivos .drawio aquí</div>
  <div class="drop-sub">o haz click para seleccionar — múltiples archivos soportados</div>
</div>

<div class="file-list" id="fileList">
  <div class="file-list-header"><span>Archivo</span><span>Tamaño</span><span>Estado</span><span></span></div>
  <div id="fileItems"></div>
</div>

<div class="actions" id="actions" style="display:none">
  <button class="btn btn-primary" id="btnConvert">Convertir a PNG</button>
  <button class="btn btn-ghost"   id="btnClear">Limpiar</button>
  <button class="btn btn-dl"      id="btnDownload" disabled>⬇ Descargar ZIP</button>
  <span class="progress-info" id="progressInfo"></span>
</div>

<div class="log-box" id="logBox">
  <div class="log-header"><div class="log-dot stopped" id="logDot"></div><span>output</span></div>
  <div class="log-content" id="logContent"></div>
</div>

<footer>
  <span>render: iframe → embed.diagrams.net (postMessage API)</span>
  <span id="footerCount"></span>
</footer>

<script>
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),
fileListEl=document.getElementById('fileList'),fileItemsEl=document.getElementById('fileItems'),
actionsEl=document.getElementById('actions'),btnConvert=document.getElementById('btnConvert'),
btnClear=document.getElementById('btnClear'),btnDownload=document.getElementById('btnDownload'),
progressInfo=document.getElementById('progressInfo'),logBox=document.getElementById('logBox'),
logContent=document.getElementById('logContent'),logDot=document.getElementById('logDot'),
footerCount=document.getElementById('footerCount');

let files=[],results=[];

function log(msg,type='info'){
  const l=document.createElement('div'); l.className=`log-line-${type}`;
  const t=new Date().toLocaleTimeString('es-CL',{hour12:false});
  l.textContent=`[${t}] ${msg}`; logContent.appendChild(l); logContent.scrollTop=logContent.scrollHeight;
}

dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');addFiles([...e.dataTransfer.files]);});
fileInput.addEventListener('change',()=>{addFiles([...fileInput.files]);fileInput.value='';});

function addFiles(newFiles){
  const valid=newFiles.filter(f=>f.name.endsWith('.drawio')||f.name.endsWith('.xml'));
  if(!valid.length)return;
  valid.forEach(f=>{if(!files.find(x=>x.name===f.name))files.push({file:f,name:f.name,status:'pending'});});
  renderFileList(); fileListEl.classList.add('visible'); actionsEl.style.display='flex'; updateFooter();
}

function renderFileList(){
  fileItemsEl.innerHTML='';
  files.forEach((f,i)=>{
    const row=document.createElement('div'); row.className='file-item'; row.id=`fr-${i}`;
    const sz=f.file.size<1024?`${f.file.size} B`:f.file.size<1048576?`${(f.file.size/1024).toFixed(1)} KB`:`${(f.file.size/1048576).toFixed(1)} MB`;
    const lbl={pending:'—',running:'⟳ procesando',done:'✓ listo',error:'✗ error'}[f.status];
    const cls={pending:'status-pending',running:'status-running',done:'status-done',error:'status-error'}[f.status];
    row.innerHTML=`<div class="file-name" title="${f.name}">${f.name}</div><div class="file-size">${sz}</div><div class="file-status ${cls}">${lbl}</div><button class="file-remove" data-i="${i}" ${f.status==='running'?'disabled':''}>✕</button>`;
    fileItemsEl.appendChild(row);
  });
  fileItemsEl.querySelectorAll('.file-remove').forEach(btn=>btn.addEventListener('click',()=>{
    files.splice(parseInt(btn.dataset.i),1); renderFileList();
    if(!files.length){fileListEl.classList.remove('visible');actionsEl.style.display='none';} updateFooter();
  }));
}

function setStatus(i,s){
  files[i].status=s; const row=document.getElementById(`fr-${i}`); if(!row)return;
  const se=row.querySelector('.file-status'),rb=row.querySelector('.file-remove');
  se.textContent={pending:'—',running:'⟳ procesando',done:'✓ listo',error:'✗ error'}[s];
  se.className=`file-status ${{pending:'status-pending',running:'status-running',done:'status-done',error:'status-error'}[s]}`;
  if(rb)rb.disabled=s==='running';
}
function updateFooter(){footerCount.textContent=files.length?`${files.length} archivo${files.length>1?'s':''}`:''}

function readText(file){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.onerror=j;fr.readAsText(file,'utf-8');})}

// ─── NUEVO: export via iframe postMessage ───────────────────────────────────
// Evita el bloqueo CORS que ocurre con fetch directo a export.diagrams.net
function drawioToPng(xml) {
  return new Promise((resolve, reject) => {
    const ORIGIN = 'https://embed.diagrams.net';
    const TIMEOUT_MS = 45000;

    // Crear iframe oculto apuntando al embed oficial
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;border:none;';
    iframe.src = `${ORIGIN}/?embed=1&spin=1&proto=json&ui=min`;
    document.body.appendChild(iframe);

    let done = false;
    const cleanup = () => { if (iframe.parentNode) document.body.removeChild(iframe); };

    const timer = setTimeout(() => {
      if (done) return;
      done = true; cleanup();
      reject(new Error('Timeout esperando respuesta del render'));
    }, TIMEOUT_MS);

    const handler = (evt) => {
      // Solo mensajes del origen correcto
      if (evt.origin !== ORIGIN) return;
      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }

      if (msg.event === 'init') {
        // El iframe está listo: cargar el XML
        iframe.contentWindow.postMessage(JSON.stringify({
          action: 'load',
          xml: xml,
          autosave: 0
        }), ORIGIN);

      } else if (msg.event === 'load') {
        // Diagrama cargado: pedir export PNG a escala 2x
        iframe.contentWindow.postMessage(JSON.stringify({
          action: 'export',
          format: 'png',
          scale: 2,
          border: 10
        }), ORIGIN);

      } else if (msg.event === 'export') {
        if (done) return;
        done = true;
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        cleanup();
        // msg.data es el data-URL en base64 del PNG
        if (msg.data) {
          resolve(msg.data);
        } else {
          reject(new Error('Export vacío: el diagrama puede estar en blanco'));
        }

      } else if (msg.event === 'error') {
        if (done) return;
        done = true;
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        cleanup();
        reject(new Error(msg.message || 'Error en el render'));
      }
    };

    window.addEventListener('message', handler);
  });
}
// ────────────────────────────────────────────────────────────────────────────

btnConvert.addEventListener('click', async () => {
  if (!files.length) return;
  results = []; btnDownload.disabled = true; btnConvert.disabled = true; btnClear.disabled = true;
  logBox.classList.add('visible'); logDot.classList.remove('stopped'); logContent.innerHTML = '';
  log('Iniciando conversión...', 'info');
  files.forEach((_, i) => setStatus(i, 'pending'));
  let ok = 0, fail = 0;

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    log(`→ ${f.name}`, 'info'); setStatus(i, 'running'); progressInfo.textContent = `${i + 1} / ${files.length}`;
    try {
      const xml = await readText(f.file);
      const dataUrl = await drawioToPng(xml);

      // Calcular tamaño aproximado del PNG desde base64
      const b64 = dataUrl.split(',')[1] || '';
      const approxKb = ((b64.length * 3) / 4 / 1024).toFixed(1);

      setStatus(i, 'done');
      results.push({ name: f.name.replace(/\.(drawio|xml)$/i, '.png'), dataUrl });
      log(`  ✓ PNG ok (~${approxKb} KB)`, 'ok'); ok++;
    } catch (err) {
      setStatus(i, 'error');
      log(`  ✗ ${err.message}`, 'err'); fail++;
    }
  }

  logDot.classList.add('stopped'); btnConvert.disabled = false; btnClear.disabled = false; progressInfo.textContent = '';
  log(`─── ${ok} ok, ${fail} error ───`, ok > 0 ? 'ok' : 'err');
  if (results.length) btnDownload.disabled = false;
});

btnDownload.addEventListener('click', async () => {
  if (!results.length) return;
  btnDownload.disabled = true; btnDownload.textContent = '⟳ ZIP...';
  const zip = new JSZip();
  for (const r of results) zip.file(r.name, r.dataUrl.split(',')[1], { base64: true });
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `diagramas_png_${Date.now()}.zip`; a.click();
  btnDownload.disabled = false; btnDownload.textContent = '⬇ Descargar ZIP';
});

btnClear.addEventListener('click', () => {
  if (btnClear.disabled) return;
  files = []; results = []; fileItemsEl.innerHTML = ''; fileListEl.classList.remove('visible');
  actionsEl.style.display = 'none'; logBox.classList.remove('visible'); logContent.innerHTML = '';
  btnDownload.disabled = true; progressInfo.textContent = ''; updateFooter();
});
</script>
</body>
</html>
